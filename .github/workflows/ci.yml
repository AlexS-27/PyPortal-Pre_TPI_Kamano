name: PyPortal CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # E9, F63, F7, F82 sont des erreurs critiques (syntaxe, etc.)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Le reste est traité comme des avertissements
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Database Init Test
      # On ajoute une variable d'environnement pour dire à Pygame de ne pas chercher d'écran
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        python init.db.py
        # Optionnel : vérifier si le fichier a bien été créé
        ls -l pyportal.db

        - name: Run tests with pytest
            run: |
              pytest tests/